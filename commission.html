  <main class="container card-stack">

      <div class="card text-bg-dark border-0 overflow-hidden">
        <img
          src="assets/images/X3Nart.webp"
          class="card-img"
          style="height: 240px; object-fit: cover; filter: brightness(50%);"
          alt="Anime illustration portfolio header by X3NArt"

        <div class="card-img-overlay">

          </p>
        </div>
      </div>
    </a>
  </main>
