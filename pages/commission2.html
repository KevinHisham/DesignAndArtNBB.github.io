<!doctype html>
<html lang="en">
  <head>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    
    <link rel="stylesheet" href="../assets/css/style.css" />

    <link

  </head>

  <body>
    <div style="position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); pointer-events: none; z-index: -1;"></div>
    <div class="bg-layer" aria-hidden="true">
      <div class="bg-dim"></div>
    </div>

    <div id="site-navbar"></div>

<main class="container text-center detail-page">
  <div class="row g-4 text-start">
    
    <div class="col-12 col-lg-5 text-center">
      <div class="row mb-3">
        <div class="col">
          <img
            src="../assets/images/LoremIpsum2.webp"
            class="card-img zoomable rounded-3"
            alt="Main featured anime illustration by LoremIpsum"
          />
        </div>
      </div>

      <div class="row g-3">
        <div class="col thumb-wrapper">
          <img
            src="../assets/images/LoremIpsum3.webp"
            class="thumb-img zoomable rounded-3"
            alt="Close-up detail showcase 1"
          />
        </div>
        <div class="col thumb-wrapper">
          <img
            src="../assets/images/LoremIpsum4.webp"
            class="thumb-img zoomable rounded-3"
            alt="Close-up detail showcase 2"
          />
        </div>
        <div class="col thumb-wrapper">
          <img
            src="../assets/images/LoremIpsum5.webp"
            class="thumb-img zoomable rounded-3"
            alt="Close-up detail showcase 3"
          />
        </div>
      </div>
    </div>


        <div class="col-12 col-lg-7 ps-lg-5">
          <h1 class="detail-title">Pen Name</h1>
          <p class="detail-price h2 text-white">Rp 000,000 — Rp 000,000</p>
          
          <p class="text-white body-text mb-4">
            Lorem Ipsum Dolor Sit Amet
          </p>

          <div class="d-flex flex-wrap gap-2">
            <a href="https://vgen.co/LoremIpsum" class="btn btn-lg fw-bold" style="background-color: #B8FF26; color: #000000;">VGEN</a>
            <a href="https://www.pixiv.net/en/users/LoremIpsum" class="btn btn-lg text-white" style="background-color: #0096FA;">PIXIV</a>
            <a href="https://x.com/LoremIpsum" class="btn btn-lg text-white" style="background-color: #000000;">X</a>
          </div>
        </div>

      </div>
    </main>

    <div class="lightbox" id="lightbox" role="dialog" aria-hidden="true" aria-label="Image expansion modal">
      <img id="lightbox-img" src="" alt="Expanded active view" />
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="../assets/js/navbar.js"></script>
    <script>
      renderNavbar("commission", "../");
    </script>
    <script>
      // Gallery Lightbox Controller Engine
      const lightbox = document.getElementById("lightbox");
      const lightboxImg = document.getElementById("lightbox-img");

      document.querySelectorAll(".zoomable").forEach(img => {
        img.addEventListener("click", () => {
          lightboxImg.src = img.src;
          lightbox.setAttribute("aria-hidden", "false");
          lightbox.classList.add("active");
        });
      });

      lightbox.addEventListener("click", () => {
        lightbox.setAttribute("aria-hidden", "true");
        lightbox.classList.remove("active");
      });
    </script>
  </body>
</html>
